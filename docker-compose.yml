services:
  evolution:
    image: atendai/evolution-api:v1.8.7
    container_name: aromap-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: "http://localhost:8080"
      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "${EVOLUTION_API_KEY}"
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
    volumes:
      - evolution_data:/evolution/instances

  postgres:
    image: postgres:16
    container_name: aromap-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: aromap-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend      # hot-reload: mudanças no host refletem sem rebuild
      - ./frontend:/app/frontend    # hot-reload: HTML/CSS/JS sempre atualizados
      - ./backend/uploads:/app/backend/uploads  # bind mount: acessível no host
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  notificador:
    build: .
    container_name: aromap-notificador
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      EVOLUTION_API_URL: http://evolution:8080
    volumes:
      - ./backend/uploads:/app/backend/uploads
    working_dir: /app
    command: python notificador.py
    depends_on:
      postgres:
        condition: service_healthy
      evolution:
        condition: service_started

volumes:
  postgres_data:
  evolution_data:
