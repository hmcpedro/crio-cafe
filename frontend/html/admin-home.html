<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aromap - Admin</title>
  <link rel="stylesheet" href="/static/css/admin-home.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-paper">
      <header class="topbar">
        <div class="brand-wrap">
          <img src="/static/img/logo-aromap.png" alt="Aromap" class="brand-logo" />
        </div>

        <nav class="topnav">
          <a href="/admin" class="active">Home</a>
          <a href="/admin/campanhas">Campanhas</a>
          <a href="/admin/relatorios">Relatórios</a>
          <a href="/login">Sair</a>
        </nav>
      </header>

      <main class="admin-content">
        <section class="campaign-panel">
          <div class="campaign-header">
            <div class="campaign-header-left">
              <h1>Últimas campanhas</h1>
              <p>Campanhas promocionais ativas e agendadas</p>
            </div>
            <a href="/admin/nova-campanha" class="new-campaign-btn">+ Nova Campanha</a>
          </div>
          <div class="campaign-divider"></div>

          <div class="campaign-grid" id="campaignGrid">
            <!-- preenchido dinamicamente por admin-home.js -->
          </div>
        </section>

        <section class="admin-summary">
          <div class="summary-block summary-list">
            <div class="summary-title-row">
              <h3>Campanhas ativas</h3>
              <div class="summary-line"></div>
            </div>

            <ul id="listaAtivas">
              <!-- preenchido dinamicamente -->
            </ul>
          </div>

          <div class="summary-vertical-line"></div>

          <div class="summary-block summary-metrics">
            <div class="summary-title-row">
              <h3>Visão Geral</h3>
              <div class="summary-line"></div>
            </div>

            <div class="metric-grid">
              <div class="metric-card">
                <strong id="metAtivas">—</strong>
                <span>Campanhas Ativas</span>
              </div>

              <div class="metric-card">
                <strong id="metTotal">—</strong>
                <span>Campanhas Criadas</span>
              </div>

              <div class="metric-card">
                <strong id="metNotifs">—</strong>
                <span>Notificações Enviadas</span>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="page-footer">
        <div class="footer-line"></div>
        <img src="/static/img/logo-aromap.png" alt="Aromap" class="footer-logo" />
      </footer>
    </div>
  </div>

  <script src="/static/js/admin-home.js"></script>
</body>
</html>
