<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aromap - Nova Campanha</title>
  <link rel="stylesheet" href="/static/css/admin-nova-campanha.css" />
</head>
<body>
  <div class="page-shell">
    <div class="page-paper">

      <header class="topbar">
        <div class="brand-wrap">
          <img src="/static/img/logo-aromap.png" alt="Aromap" class="brand-logo" />
        </div>
        <nav class="topnav">
          <a href="/admin">Home</a>
          <a href="/admin/campanhas" class="active">Campanhas</a>
          <a href="/admin/relatorios">Relatórios</a>
          <a href="/login">Sair</a>
        </nav>
      </header>

      <main class="admin-main">

        <div class="toolbar">
          <a href="/admin/campanhas" class="breadcrumb-back">← Campanhas</a>
        </div>

        <section class="page-header">
          <h1>Nova Campanha</h1>
          <p>Preencha os dados para criar uma nova campanha promocional</p>
        </section>

        <div class="page-divider"></div>

        <form class="campaign-form" id="campaignForm">

          <div class="form-grid">

            <!-- Coluna esquerda -->
            <div class="form-col">

              <section class="form-section">
                <div class="section-title-row">
                  <h2>Identificação</h2>
                  <div class="section-line"></div>
                </div>

                <div class="form-group">
                  <label for="campName">Nome da campanha</label>
                  <input type="text" id="campName" placeholder="Ex: Vale da Tarde" />
                </div>

                <div class="form-group">
                  <label for="campDesc">Descrição</label>
                  <textarea id="campDesc" rows="4" placeholder="Descreva o benefício oferecido ao cliente..."></textarea>
                </div>

                <div class="form-group">
                  <label for="campProduct">Produto alvo</label>
                  <input type="text" id="campProduct" placeholder="Ex: Pão de queijo artesanal" />
                </div>
              </section>

              <section class="form-section">
                <div class="section-title-row">
                  <h2>Benefício</h2>
                  <div class="section-line"></div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="discountType">Tipo de desconto</label>
                    <select id="discountType">
                      <option value="percentual">Percentual (%)</option>
                      <option value="fixo">Valor fixo (R$)</option>
                      <option value="combo">Combo especial</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label for="discountValue">Valor</label>
                    <input type="text" id="discountValue" placeholder="Ex: 20" />
                  </div>
                </div>
              </section>

              <!-- Upload de imagem -->
              <section class="form-section">
                <div class="section-title-row">
                  <h2>Imagem</h2>
                  <div class="section-line"></div>
                </div>

                <div class="upload-area" id="uploadArea">
                  <div class="upload-inner">
                    <div class="upload-icon">🖼</div>
                    <p class="upload-label">Arraste uma imagem ou <span class="upload-link">clique para selecionar</span></p>
                    <p class="upload-hint">PNG ou JPG · máx. 5 MB · proporção recomendada 3:4</p>
                  </div>
                  <input type="file" id="imageInput" accept="image/*" class="upload-input" />
                </div>

                <div class="upload-preview" id="uploadPreview" style="display:none">
                  <img id="previewImg" src="" alt="Prévia" class="preview-img" />
                  <button type="button" class="preview-remove" id="removeImage">Remover</button>
                </div>
              </section>

            </div>

            <!-- Coluna direita -->
            <div class="form-col">

              <section class="form-section">
                <div class="section-title-row">
                  <h2>Período</h2>
                  <div class="section-line"></div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="startDate">Data de início</label>
                    <input type="date" id="startDate" />
                  </div>
                  <div class="form-group">
                    <label for="endDate">Data de término</label>
                    <input type="date" id="endDate" />
                  </div>
                </div>

                <div class="form-row">
                  <div class="form-group">
                    <label for="startTime">Horário início</label>
                    <input type="time" id="startTime" />
                  </div>
                  <div class="form-group">
                    <label for="endTime">Horário fim</label>
                    <input type="time" id="endTime" />
                  </div>
                </div>

                <div class="form-group">
                  <label>Dias da semana</label>
                  <div class="weekdays">
                    <label class="day-toggle"><input type="checkbox" value="seg" /><span>Seg</span></label>
                    <label class="day-toggle"><input type="checkbox" value="ter" /><span>Ter</span></label>
                    <label class="day-toggle"><input type="checkbox" value="qua" /><span>Qua</span></label>
                    <label class="day-toggle"><input type="checkbox" value="qui" /><span>Qui</span></label>
                    <label class="day-toggle"><input type="checkbox" value="sex" /><span>Sex</span></label>
                    <label class="day-toggle"><input type="checkbox" value="sab" /><span>Sáb</span></label>
                    <label class="day-toggle"><input type="checkbox" value="dom" /><span>Dom</span></label>
                  </div>
                </div>
              </section>

              <section class="form-section">
                <div class="section-title-row">
                  <h2>Unidades</h2>
                  <div class="section-line"></div>
                </div>

                <div class="units-check">
                  <label class="unit-option">
                    <input type="checkbox" value="vila-mariana" />
                    <span class="unit-box">
                      <span class="unit-name">Vila Mariana</span>
                      <span class="unit-addr">R. Domingos de Morais, 2187</span>
                    </span>
                  </label>
                  <label class="unit-option">
                    <input type="checkbox" value="jardim-paulista" />
                    <span class="unit-box">
                      <span class="unit-name">Jardim Paulista</span>
                      <span class="unit-addr">Av. Paulista, 900</span>
                    </span>
                  </label>
                </div>
              </section>

              <section class="form-section">
                <div class="section-title-row">
                  <h2>Notificações</h2>
                  <div class="section-line"></div>
                </div>

                <div class="form-group">
                  <label>Enviar notificação</label>
                  <div class="notif-options">
                    <label class="radio-option">
                      <input type="radio" name="notif" value="imediato" checked />
                      <span>Imediatamente ao salvar</span>
                    </label>
                    <label class="radio-option">
                      <input type="radio" name="notif" value="agendado" />
                      <span>Agendar envio</span>
                    </label>
                    <label class="radio-option">
                      <input type="radio" name="notif" value="manual" />
                      <span>Enviar manualmente depois</span>
                    </label>
                  </div>
                </div>

                <div class="form-group" id="notifScheduleGroup" style="display:none">
                  <label>Data e hora do envio agendado</label>
                  <div class="form-row">
                    <div class="form-group">
                      <input type="date" id="notifDate" />
                    </div>
                    <div class="form-group">
                      <input type="time" id="notifTime" />
                    </div>
                  </div>
                </div>
              </section>

            </div>
          </div>

          <!-- Ações do formulário -->
          <div class="form-actions">
            <a href="/admin/campanhas" class="btn-cancel">Cancelar</a>
            <button type="submit" class="btn-submit">Criar Campanha</button>
          </div>

          <p class="form-message" id="formMessage"></p>
        </form>

      </main>

      <footer class="page-footer">
        <div class="footer-line"></div>
        <img src="/static/img/logo-aromap.png" alt="Aromap" class="footer-logo" />
      </footer>
    </div>
  </div>

  <script src="/static/js/admin-nova-campanha.js"></script>
</body>
</html>
